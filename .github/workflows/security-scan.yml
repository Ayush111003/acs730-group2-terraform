name: Terraform Security Scan

on:
  push:
    branches:
      - staging
  pull_request:
    branches:
      - prod

jobs:
  tfsec:
    name: tfsec security scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Run tfsec
        uses: aquasecurity/tfsec-action@v1.0.0
        with:
          soft_fail: true
